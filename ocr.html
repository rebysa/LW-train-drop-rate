<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Last War Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold:   #f5c842;
    --silver: #a8b8d0;
    --bronze: #c97c3a;
    --bg:     #090e1a;
    --panel:  #0d1628;
    --border: #1e3050;
    --accent: #38bdf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: #e2eaf5;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    padding: 28px 16px 60px;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(56,189,248,0.08) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,48,80,0.3) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,48,80,0.15) 40px);
  }

  /* HEADER */
  header { text-align: center; margin-bottom: 28px; }
  header h1 {
    font-size: 2rem; font-weight: 700; letter-spacing: 4px;
    text-transform: uppercase; color: var(--accent);
    text-shadow: 0 0 24px rgba(56,189,248,0.55);
  }
  header p { color: var(--silver); font-size: .9rem; letter-spacing: 2px; margin-top: 4px; }

  /* UPLOAD */
  #imageInput { display: none; }

  .drop-zone {
    max-width: 500px; margin: 0 auto 20px;
    border: 2px dashed var(--border); border-radius: 14px;
    background: var(--panel); padding: 28px 20px; text-align: center;
    transition: border-color .2s, background .2s;
  }
  .drop-zone.dragover { border-color: var(--accent); background: rgba(56,189,248,0.06); }
  .drop-zone .icon { font-size: 2.4rem; display: block; margin-bottom: 8px; }
  .drop-zone p { color: var(--silver); margin-bottom: 14px; font-size: 1rem; }

  .pick-btn {
    display: inline-block; padding: 9px 24px; border-radius: 8px;
    border: 2px solid var(--accent); color: var(--accent); background: transparent;
    font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
    letter-spacing: 1px; cursor: pointer; transition: background .2s, color .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .pick-btn:hover, .pick-btn:active { background: var(--accent); color: #0a1628; }

  #filename {
    margin-top: 10px; font-size: .9rem;
    color: #4ade80; display: none;
  }

  /* PREVIEW */
  #preview-wrap {
    display: none; max-width: 260px; margin: 0 auto 18px;
    border-radius: 12px; overflow: hidden; border: 2px solid var(--border);
  }
  #preview-wrap img { width: 100%; display: block; }

  /* BUTTON */
  .btn {
    display: block; margin: 0 auto 20px; padding: 14px 40px;
    border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #0ea5e9);
    color: #0a1628; font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    box-shadow: 0 0 20px rgba(56,189,248,0.3);
    transition: opacity .2s, transform .15s;
  }
  .btn:hover { opacity: .9; transform: translateY(-2px); }
  .btn:active { transform: none; }
  .btn:disabled { background: #1e3050; color: #4a6080; box-shadow: none; cursor: not-allowed; transform: none; }

  /* STATUS */
  #status {
    text-align: center; min-height: 24px; margin-bottom: 14px;
    font-size: 1rem; letter-spacing: 1px; color: var(--silver);
  }
  #status.ok    { color: #4ade80; }
  #status.error { color: #f87171; }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(56,189,248,0.3); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TABLE */
  .table-wrap {
    display: none; max-width: 640px; margin: 0 auto;
    border-radius: 14px; overflow: hidden;
    border: 1px solid var(--border); box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #111e35; }
  thead th {
    padding: 12px 16px; text-align: left; font-size: .8rem;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent); border-bottom: 1px solid var(--border);
  }
  thead th:last-child { text-align: right; }

  tbody tr {
    background: var(--panel); border-bottom: 1px solid var(--border);
    animation: rowIn .35s ease both;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(56,189,248,0.04); }
  @keyframes rowIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:none; } }

  td { padding: 12px 16px; }
  .td-rank { font-family: 'Share Tech Mono', monospace; width: 38px; }
  .td-name { font-weight: 700; font-size: 1.05rem; }
  .td-pts  { font-family: 'Share Tech Mono', monospace; color: var(--accent); text-align: right; }

  .rank-1 { color: var(--gold);   font-weight: 700; }
  .rank-2 { color: var(--silver); font-weight: 700; }
  .rank-3 { color: var(--bronze); font-weight: 700; }

  /* EXPORT */
  .export-bar {
    display: none; max-width: 640px; margin: 12px auto 0;
    justify-content: flex-end;
  }
  .btn-sm {
    padding: 8px 18px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--panel); color: var(--silver);
    font-family: 'Rajdhani', sans-serif; font-size: .9rem; font-weight: 600;
    letter-spacing: 1px; cursor: pointer; transition: border-color .2s, color .2s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>⚔ Last War Scanner</h1>
  <p>Leaderboard OCR · Claude Vision</p>
</header>

<!-- UPLOAD -->
<input type="file" id="imageInput" accept="image/*"/>
<div class="drop-zone" id="dropZone">
  <span class="icon">📷</span>
  <p>Trascina uno screenshot qui</p>
  <label for="imageInput" class="pick-btn">Scegli immagine</label>
  <div id="filename"></div>
</div>

<div id="preview-wrap">
  <img id="preview" alt="preview"/>
</div>

<button class="btn" id="readBtn" disabled>Analizza Screenshot</button>
<div id="status"></div>

<div class="table-wrap" id="tableWrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Giocatore</th>
        <th>Punti</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="export-bar" id="exportBar">
  <button class="btn-sm" id="copyBtn">📋 Copia CSV</button>
</div>

<script>
const imageInput  = document.getElementById("imageInput");
const readBtn     = document.getElementById("readBtn");
const tableBody   = document.getElementById("tableBody");
const statusDiv   = document.getElementById("status");
const preview     = document.getElementById("preview");
const previewWrap = document.getElementById("preview-wrap");
const dropZone    = document.getElementById("dropZone");
const tableWrap   = document.getElementById("tableWrap");
const exportBar   = document.getElementById("exportBar");
const copyBtn     = document.getElementById("copyBtn");
const filename    = document.getElementById("filename");

let currentPlayers = [];
let currentBase64  = "";
let currentMime    = "";

// Drag & drop
dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

imageInput.addEventListener("change", () => {
  if (imageInput.files[0]) loadFile(imageInput.files[0]);
});

function loadFile(file) {
  preview.src = URL.createObjectURL(file);
  previewWrap.style.display = "block";
  filename.textContent = "✅ " + file.name;
  filename.style.display = "block";
  readBtn.disabled = false;
  setStatus("", "");
  tableWrap.style.display = "none";
  exportBar.style.display = "none";

  const reader = new FileReader();
  reader.onload = e => {
    currentBase64 = e.target.result.split(",")[1];
    currentMime   = file.type || "image/jpeg";
  };
  reader.readAsDataURL(file);
}

readBtn.addEventListener("click", async () => {
  if (!currentBase64) return;
  readBtn.disabled = true;
  setStatus('<span class="spinner"></span> Analisi in corso…', "");
  tableWrap.style.display = "none";
  exportBar.style.display = "none";

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: currentMime, data: currentBase64 } },
            { type: "text", text: `This is a leaderboard screenshot from the game "Last War: Survival".
Extract ALL players visible and return ONLY a valid JSON array, no markdown, no backticks, no explanation.
Each object must have exactly two keys: "name" (string) and "points" (number, digits only, no commas).
Example: [{"name":"Cpt Cockov","points":79547896},{"name":"Nuclear Maximus","points":61795097}]
Extract every player you can see, preserving the visual order from top to bottom.` }
          ]
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw   = data.content.map(b => b.text || "").join("").trim();
    const clean = raw.replace(/```json|```/gi, "").trim();
    const players = JSON.parse(clean);

    currentPlayers = players;
    renderTable(players);
    setStatus("✅ Trovati " + players.length + " giocatori", "ok");
    tableWrap.style.display = "block";
    exportBar.style.display = "flex";

  } catch (err) {
    setStatus("❌ " + (err.message || "Errore analisi"), "error");
  }

  readBtn.disabled = false;
});

function setStatus(html, cls) {
  statusDiv.innerHTML = html;
  statusDiv.className = cls;
}

const MEDALS = ["🥇","🥈","🥉"];

function renderTable(players) {
  tableBody.innerHTML = "";
  players.forEach((p, i) => {
    const rankCls = i < 3 ? " rank-" + (i+1) : "";
    const medal   = MEDALS[i] ? MEDALS[i] + " " : "";
    const tr = document.createElement("tr");
    tr.style.animationDelay = (i * 45) + "ms";
    tr.innerHTML =
      '<td class="td-rank' + rankCls + '">' + (i+1) + '</td>' +
      '<td class="td-name">' + medal + esc(p.name) + '</td>' +
      '<td class="td-pts">'  + Number(p.points).toLocaleString("it-IT") + '</td>';
    tableBody.appendChild(tr);
  });
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

copyBtn.addEventListener("click", () => {
  if (!currentPlayers.length) return;
  const csv = "Nome,Punti\n" + currentPlayers.map(p => p.name + "," + p.points).join("\n");
  navigator.clipboard.writeText(csv).then(() => {
    copyBtn.textContent = "✅ Copiato!";
    setTimeout(() => { copyBtn.textContent = "📋 Copia CSV"; }, 2000);
  });
});
</script>
</body>
</html>
