<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Last War · Leaderboard Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:   #f5c842;
    --silver: #a8b8d0;
    --bronze: #c97c3a;
    --bg:     #090e1a;
    --panel:  #0d1628;
    --border: #1e3050;
    --accent: #38bdf8;
    --glow:   rgba(56,189,248,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: #e2eaf5;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    padding: 28px 20px 60px;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(56,189,248,0.07) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,48,80,0.35) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,48,80,0.18) 40px);
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 24px rgba(56,189,248,0.5);
  }

  header p {
    color: var(--silver);
    font-size: 1rem;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    background: var(--panel);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .25s, background .25s;
    position: relative;
    max-width: 540px;
    margin: 0 auto 28px;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(56,189,248,0.05);
  }

  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-zone .icon { font-size: 2.6rem; display: block; margin-bottom: 10px; }

  .upload-zone p {
    font-size: 1.05rem;
    color: var(--silver);
    letter-spacing: 1px;
  }

  .upload-zone span {
    color: var(--accent);
    font-weight: 700;
  }

  #preview-wrap {
    display: none;
    max-width: 300px;
    margin: 0 auto 22px;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid var(--border);
    box-shadow: 0 0 28px rgba(56,189,248,0.1);
  }

  #preview-wrap img { width: 100%; display: block; }

  .btn {
    display: block;
    margin: 0 auto 24px;
    padding: 14px 40px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #0ea5e9);
    color: #0a1628;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 0 20px rgba(56,189,248,0.3);
  }

  .btn:hover { opacity: .9; transform: translateY(-2px); box-shadow: 0 4px 28px rgba(56,189,248,0.45); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

  #status {
    text-align: center;
    min-height: 26px;
    margin-bottom: 16px;
    font-size: 1rem;
    letter-spacing: 1px;
    color: var(--silver);
  }

  #status.error { color: #f87171; }
  #status.ok    { color: #4ade80; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(56,189,248,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* TABLE */
  .table-wrap {
    max-width: 680px;
    margin: 0 auto;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }

  table { width: 100%; border-collapse: collapse; }

  thead tr {
    background: #111e35;
  }

  thead th {
    padding: 14px 18px;
    text-align: left;
    font-size: .85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    transition: background .15s;
    animation: rowIn .35s ease both;
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: none; }
  }

  tbody tr:hover { background: rgba(56,189,248,0.05); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 13px 18px;
    font-size: 1.05rem;
    letter-spacing: .5px;
  }

  .rank-cell {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    width: 42px;
    color: var(--silver);
  }

  .rank-1 { color: var(--gold);   font-weight: 700; }
  .rank-2 { color: var(--silver); font-weight: 700; }
  .rank-3 { color: var(--bronze); font-weight: 700; }

  .name-cell { font-weight: 700; font-size: 1.15rem; }

  .points-cell {
    font-family: 'Share Tech Mono', monospace;
    color: var(--accent);
    font-size: 1.05rem;
    text-align: right;
  }

  .medal { margin-right: 6px; }

  /* export */
  .export-bar {
    max-width: 680px;
    margin: 16px auto 0;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-sm {
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
    color: var(--silver);
    font-family: 'Rajdhani', sans-serif;
    font-size: .95rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }

  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>⚔ Last War Scanner</h1>
  <p>Leaderboard OCR · Powered by Claude Vision</p>
</header>

<div class="upload-zone" id="dropZone">
  <input type="file" id="imageInput" accept="image/*" />
  <span class="icon">📷</span>
  <p>Trascina uno screenshot qui<br>oppure <span>clicca per scegliere</span></p>
</div>

<div id="preview-wrap">
  <img id="preview" alt="preview" />
</div>

<button class="btn" id="readBtn" disabled>Analizza Screenshot</button>

<div id="status"></div>

<div class="table-wrap" id="tableWrap" style="display:none">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Giocatore</th>
        <th style="text-align:right">Punti</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="export-bar" id="exportBar" style="display:none">
  <button class="btn-sm" id="copyBtn">📋 Copia CSV</button>
</div>

<script>
const imageInput  = document.getElementById("imageInput");
const readBtn     = document.getElementById("readBtn");
const tableBody   = document.getElementById("tableBody");
const statusDiv   = document.getElementById("status");
const preview     = document.getElementById("preview");
const previewWrap = document.getElementById("preview-wrap");
const dropZone    = document.getElementById("dropZone");
const tableWrap   = document.getElementById("tableWrap");
const exportBar   = document.getElementById("exportBar");
const copyBtn     = document.getElementById("copyBtn");

let currentPlayers = [];

// drag & drop
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

imageInput.addEventListener("change", () => {
  if (imageInput.files[0]) loadFile(imageInput.files[0]);
});

function loadFile(file) {
  preview.src = URL.createObjectURL(file);
  previewWrap.style.display = "block";
  readBtn.disabled = false;
  statusDiv.textContent = "";
  statusDiv.className = "";
  tableWrap.style.display = "none";
  exportBar.style.display = "none";
}

readBtn.addEventListener("click", async () => {
  const file = imageInput.files[0];
  if (!file) return;

  readBtn.disabled = true;
  statusDiv.innerHTML = '<span class="spinner"></span> Analisi Claude Vision in corso…';
  statusDiv.className = "";
  tableWrap.style.display = "none";
  exportBar.style.display = "none";

  try {
    const base64 = await toBase64(file);
    const mediaType = file.type || "image/jpeg";

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            {
              type: "image",
              source: { type: "base64", media_type: mediaType, data: base64 }
            },
            {
              type: "text",
              text: `This is a leaderboard screenshot from the game "Last War: Survival". 
Extract ALL players visible and return ONLY a valid JSON array, no markdown, no backticks, no explanation.
Each object must have exactly two keys: "name" (string) and "points" (number, digits only, no commas).
Example: [{"name":"Cpt Cockov","points":79547896},{"name":"Nuclear Maximus","points":61795097}]
Extract every player you can see, preserving the visual order from top to bottom.`
            }
          ]
        }]
      })
    });

    const data = await response.json();

    if (data.error) throw new Error(data.error.message);

    const raw = data.content.map(b => b.text || "").join("").trim();

    // strip possible markdown fences
    const clean = raw.replace(/```json|```/gi, "").trim();

    const players = JSON.parse(clean);

    currentPlayers = players;
    renderTable(players);
    statusDiv.innerHTML = `✅ Trovati <strong>${players.length}</strong> giocatori`;
    statusDiv.className = "ok";
    tableWrap.style.display = "block";
    exportBar.style.display = "flex";

  } catch (err) {
    console.error(err);
    statusDiv.textContent = "❌ Errore: " + (err.message || "analisi fallita");
    statusDiv.className = "error";
  }

  readBtn.disabled = false;
});

function renderTable(players) {
  tableBody.innerHTML = "";
  const medals = ["🥇","🥈","🥉"];

  players.forEach((p, i) => {
    const rank = i + 1;
    const cls  = rank <= 3 ? `rank-${rank}` : "";
    const medal = medals[i] ? `<span class="medal">${medals[i]}</span>` : "";
    const tr = document.createElement("tr");
    tr.style.animationDelay = `${i * 50}ms`;
    tr.innerHTML = `
      <td class="rank-cell ${cls}">${rank}</td>
      <td class="name-cell">${medal}${escHtml(p.name)}</td>
      <td class="points-cell">${Number(p.points).toLocaleString("it-IT")}</td>
    `;
    tableBody.appendChild(tr);
  });
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("Lettura file fallita"));
    r.readAsDataURL(file);
  });
}

copyBtn.addEventListener("click", () => {
  if (!currentPlayers.length) return;
  const csv = "Nome,Punti\n" + currentPlayers.map(p => `${p.name},${p.points}`).join("\n");
  navigator.clipboard.writeText(csv).then(() => {
    copyBtn.textContent = "✅ Copiato!";
    setTimeout(() => copyBtn.textContent = "📋 Copia CSV", 2000);
  });
});
</script>
</body>
</html>
