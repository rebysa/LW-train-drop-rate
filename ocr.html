<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Last War Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold:   #f5c842;
    --silver: #a8b8d0;
    --bronze: #c97c3a;
    --bg:     #090e1a;
    --panel:  #0d1628;
    --border: #1e3050;
    --accent: #38bdf8;
    --green:  #4ade80;
    --red:    #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: #e2eaf5;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    padding: 28px 16px 60px;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(56,189,248,0.08) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,48,80,0.3) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,48,80,0.15) 40px);
  }

  header { text-align: center; margin-bottom: 24px; }
  header h1 {
    font-size: 2rem; font-weight: 700; letter-spacing: 4px;
    text-transform: uppercase; color: var(--accent);
    text-shadow: 0 0 24px rgba(56,189,248,0.55);
  }
  header p { color: var(--silver); font-size: .85rem; letter-spacing: 2px; margin-top: 4px; }

  /* UPLOAD */
  #imageInput { display: none; }
  .drop-zone {
    max-width: 500px; margin: 0 auto 18px;
    border: 2px dashed var(--border); border-radius: 14px;
    background: var(--panel); padding: 26px 20px; text-align: center;
    transition: border-color .2s, background .2s;
  }
  .drop-zone.over { border-color: var(--accent); background: rgba(56,189,248,0.06); }
  .drop-zone .icon { font-size: 2.2rem; display: block; margin-bottom: 8px; }
  .drop-zone p { color: var(--silver); font-size: .95rem; margin-bottom: 12px; }
  .pick-btn {
    display: inline-block; padding: 9px 24px; border-radius: 8px;
    border: 2px solid var(--accent); color: var(--accent); background: transparent;
    font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
    letter-spacing: 1px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background .2s, color .2s;
  }
  .pick-btn:active { background: var(--accent); color: #0a1628; }
  #fname { margin-top: 10px; color: var(--green); font-size: .9rem; display: none; }

  /* PREVIEW */
  #prev-wrap {
    display: none; max-width: 240px; margin: 0 auto 16px;
    border-radius: 12px; overflow: hidden; border: 2px solid var(--border);
  }
  #prev-wrap img { width: 100%; display: block; }

  /* PROGRESS */
  #prog-wrap {
    display: none; max-width: 500px; margin: 0 auto 14px;
    background: #111e35; border-radius: 8px; overflow: hidden; height: 8px;
  }
  #prog-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #38bdf8, #0ea5e9);
    transition: width .3s ease;
    border-radius: 8px;
  }

  /* BUTTONS */
  .btn {
    display: block; margin: 0 auto 16px; padding: 13px 36px;
    border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #0ea5e9);
    color: #0a1628; font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    box-shadow: 0 0 18px rgba(56,189,248,0.3);
    transition: opacity .2s, transform .15s;
  }
  .btn:hover { opacity: .9; transform: translateY(-1px); }
  .btn:active { transform: none; }
  .btn:disabled { background: #1e3050; color: #4a6080; box-shadow: none; cursor: not-allowed; transform: none; }

  /* STATUS */
  #status {
    text-align: center; min-height: 22px; margin-bottom: 14px;
    font-size: .95rem; letter-spacing: 1px; color: var(--silver);
  }
  #status.ok    { color: var(--green); }
  #status.error { color: var(--red); }

  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid rgba(56,189,248,0.3); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TABLE */
  .tbl-wrap {
    display: none; max-width: 620px; margin: 0 auto;
    border-radius: 14px; overflow: hidden;
    border: 1px solid var(--border); box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #111e35; }
  thead th {
    padding: 11px 14px; font-size: .78rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent);
    border-bottom: 1px solid var(--border);
  }
  thead th:last-child { text-align: right; }
  thead th:first-child { text-align: center; }

  tbody tr {
    background: var(--panel); border-bottom: 1px solid var(--border);
    transition: background .15s; animation: rowIn .3s ease both;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.winner {
    background: rgba(245,200,66,0.12);
    border: 1px solid rgba(245,200,66,0.4);
    box-shadow: 0 0 18px rgba(245,200,66,0.15) inset;
  }
  tbody tr.winner td { color: var(--gold) !important; font-weight: 700 !important; }
  tbody tr.winner .pts { color: var(--gold) !important; }

  @keyframes rowIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:none; } }

  td { padding: 11px 14px; }
  .td-rank { text-align: center; font-family: 'Share Tech Mono', monospace; width: 36px; }
  .td-name { font-weight: 700; font-size: 1rem; }
  .td-pts  { text-align: right; font-family: 'Share Tech Mono', monospace; color: var(--accent); }
  .rank-1 { color: var(--gold);   font-weight: 700; }
  .rank-2 { color: var(--silver); font-weight: 700; }
  .rank-3 { color: var(--bronze); font-weight: 700; }

  /* ACTIONS */
  .actions {
    display: none; max-width: 620px; margin: 12px auto 0;
    gap: 10px; justify-content: flex-end; flex-wrap: wrap;
  }
  .btn-sm {
    padding: 8px 18px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--panel); color: var(--silver);
    font-family: 'Rajdhani', sans-serif; font-size: .88rem; font-weight: 600;
    letter-spacing: 1px; cursor: pointer; transition: border-color .2s, color .2s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.highlight { border-color: var(--gold); color: var(--gold); }
  .btn-sm.highlight:hover { background: rgba(245,200,66,0.08); }

  /* WINNER BANNER */
  #winner-banner {
    display: none; max-width: 620px; margin: 14px auto 0;
    background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.35);
    border-radius: 12px; padding: 16px 20px; text-align: center;
  }
  #winner-banner .wlabel { font-size: .8rem; letter-spacing: 2px; color: var(--silver); text-transform: uppercase; }
  #winner-banner .wname  { font-size: 1.6rem; font-weight: 700; color: var(--gold); margin: 4px 0; }
  #winner-banner .wpts   { font-family: 'Share Tech Mono', monospace; color: var(--accent); }

  /* canvas nascosto per pre-processing */
  #canvas { display: none; }
</style>
</head>
<body>

<header>
  <h1>⚔ Last War Scanner</h1>
  <p>OCR Locale · Tesseract.js · Estrazione Random</p>
</header>

<canvas id="canvas"></canvas>

<input type="file" id="imageInput" accept="image/*"/>
<div class="drop-zone" id="dropZone">
  <span class="icon">📷</span>
  <p>Trascina uno screenshot qui</p>
  <label for="imageInput" class="pick-btn">Scegli immagine</label>
  <div id="fname"></div>
</div>

<div id="prev-wrap"><img id="preview" alt="preview"/></div>

<div id="prog-wrap"><div id="prog-bar"></div></div>

<button class="btn" id="readBtn" disabled>Analizza Screenshot</button>
<div id="status"></div>

<div class="tbl-wrap" id="tableWrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Giocatore</th>
        <th>Punti</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div id="winner-banner">
  <div class="wlabel">🎰 Vincitore Estratto</div>
  <div class="wname" id="wname"></div>
  <div class="wpts"  id="wpts"></div>
</div>

<div class="actions" id="actions">
  <button class="btn-sm highlight" id="extractBtn">🎲 Estrai Vincitore</button>
  <button class="btn-sm" id="copyBtn">📋 Copia CSV</button>
</div>

<script>
/* ── DOM refs ── */
const imageInput  = document.getElementById("imageInput");
const readBtn     = document.getElementById("readBtn");
const tableBody   = document.getElementById("tableBody");
const statusDiv   = document.getElementById("status");
const preview     = document.getElementById("preview");
const prevWrap    = document.getElementById("prev-wrap");
const dropZone    = document.getElementById("dropZone");
const tableWrap   = document.getElementById("tableWrap");
const actions     = document.getElementById("actions");
const copyBtn     = document.getElementById("copyBtn");
const extractBtn  = document.getElementById("extractBtn");
const progWrap    = document.getElementById("prog-wrap");
const progBar     = document.getElementById("prog-bar");
const fname       = document.getElementById("fname");
const canvas      = document.getElementById("canvas");
const ctx         = canvas.getContext("2d");
const wbanner     = document.getElementById("winner-banner");
const wname       = document.getElementById("wname");
const wpts        = document.getElementById("wpts");

const MEDALS = ["🥇","🥈","🥉"];
let players = [];
let currentFile = null;
let winnerIdx = -1;

/* ── Drag & drop ── */
dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("over"));
dropZone.addEventListener("drop", e => {
  e.preventDefault(); dropZone.classList.remove("over");
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
imageInput.addEventListener("change", () => { if (imageInput.files[0]) loadFile(imageInput.files[0]); });

function loadFile(file) {
  currentFile = file;
  preview.src = URL.createObjectURL(file);
  prevWrap.style.display = "block";
  fname.textContent = "✅ " + file.name;
  fname.style.display = "block";
  readBtn.disabled = false;
  setStatus("", "");
  tableWrap.style.display = "none";
  actions.style.display = "none";
  wbanner.style.display = "none";
  players = []; winnerIdx = -1;
}

/* ── Pre-processing immagine su canvas ──
   Converte in scala di grigi + aumenta contrasto per migliorare OCR */
function preprocessImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      // Scala l'immagine a 2x per migliorare la precisione OCR
      const scale = 2;
      canvas.width  = img.width  * scale;
      canvas.height = img.height * scale;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      // Converti in scala di grigi con contrasto aumentato
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imageData.data;
      for (let i = 0; i < d.length; i += 4) {
        // Luminanza
        let v = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
        // Contrasto: sposta verso bianco o nero
        v = v > 128 ? Math.min(255, v * 1.3) : Math.max(0, v * 0.7);
        d[i] = d[i+1] = d[i+2] = v;
      }
      ctx.putImageData(imageData, 0, 0);
      canvas.toBlob(resolve, "image/png");
    };
    img.src = URL.createObjectURL(file);
  });
}

/* ── OCR ── */
readBtn.addEventListener("click", async () => {
  if (!currentFile) return;
  readBtn.disabled = true;
  players = []; winnerIdx = -1;
  tableWrap.style.display = "none";
  actions.style.display = "none";
  wbanner.style.display = "none";
  progWrap.style.display = "block";
  progBar.style.width = "0%";
  setStatus('<span class="spinner"></span> Pre-processing immagine…', "");

  try {
    const processed = await preprocessImage(currentFile);

    setStatus('<span class="spinner"></span> OCR in corso…', "");

    const result = await Tesseract.recognize(processed, "eng", {
      logger: m => {
        if (m.status === "recognizing text") {
          progBar.style.width = (m.progress * 100).toFixed(0) + "%";
        }
      }
    });

    progBar.style.width = "100%";
    progWrap.style.display = "none";

    const text = result.data.text;
    console.log("RAW OCR:\n", text);

    players = parseLeaderboard(text);

    if (players.length === 0) {
      setStatus("❌ Nessun giocatore trovato. Riprova con uno screenshot più nitido.", "error");
    } else {
      renderTable(players);
      setStatus("✅ Trovati " + players.length + " giocatori", "ok");
      tableWrap.style.display = "block";
      actions.style.display   = "flex";
    }

  } catch (err) {
    console.error(err);
    progWrap.style.display = "none";
    setStatus("❌ Errore OCR: " + err.message, "error");
  }

  readBtn.disabled = false;
});

/* ── Parser ──
   Strategia:
   1. Splitta in righe pulite
   2. Trova le righe con numeri grossi (punti): pattern NNN,NNN,NNN
   3. Per ogni riga-punti cerca il nome nelle righe precedenti
      ignorando tag alleanza e righe già usate
*/
function parseLeaderboard(text) {
  const lines = text
    .split("\n")
    .map(l => l.trim())
    .filter(Boolean);

  // Pattern punti: almeno 5 cifre con virgole/punti come separatori
  const rePts  = /^[\d][,.\d]{4,}$/;
  // Pattern alleanza/clan: contiene [ ] o parole tipo "Valhalla" "Gladiators" ecc.
  const reTag  = /[\[\]]/;
  // Pattern solo numeri (rank o altro)
  const reNum  = /^\d{1,3}$/;

  const results = [];
  const usedLines = new Set();

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i].replace(/[,. ]/g, ""); // rimuovi separatori
    const numOnly = raw.replace(/[^\d]/g, "");

    // Considera questa riga come "punti" se:
    // - è composta quasi solo da cifre e separatori
    // - ha almeno 5 cifre
    if (numOnly.length >= 5 && lines[i].replace(/[^\d.,]/g, "").length / lines[i].length > 0.7) {
      const pts = parseInt(numOnly, 10);
      if (isNaN(pts) || pts < 1000) continue;

      // Cerca il nome nelle righe precedenti (fino a 4 sopra)
      let name = "";
      for (let j = i - 1; j >= Math.max(0, i - 4); j--) {
        if (usedLines.has(j)) continue;
        const candidate = lines[j];

        // Salta tag alleanza
        if (reTag.test(candidate)) continue;
        // Salta se contiene solo numeri piccoli (rank)
        if (reNum.test(candidate)) continue;
        // Salta se è un'altra riga di punti
        const cNum = candidate.replace(/[^\d]/g, "");
        if (cNum.length >= 5 && candidate.replace(/[^\d.,]/g, "").length / candidate.length > 0.7) continue;
        // Deve avere almeno 3 caratteri alfabetici
        if ((candidate.match(/[a-zA-Z]/g) || []).length < 3) continue;

        name = candidate
          .replace(/[^a-zA-Z0-9 _\-\.]/g, "") // rimuovi spazzatura OCR
          .trim();

        if (name.length >= 2) {
          usedLines.add(j);
          break;
        }
      }

      if (name) {
        results.push({ name, points: pts });
        usedLines.add(i);
      }
    }
  }

  // Ordina per punti decrescenti (rispetta l'ordine originale del leaderboard)
  results.sort((a, b) => b.points - a.points);

  // Rimuovi duplicati per nome
  const seen = new Set();
  return results.filter(p => {
    if (seen.has(p.name)) return false;
    seen.add(p.name); return true;
  });
}

/* ── Render tabella ── */
function renderTable(list, highlightIdx = -1) {
  tableBody.innerHTML = "";
  list.forEach((p, i) => {
    const rankCls = i < 3 ? " rank-" + (i + 1) : "";
    const medal   = MEDALS[i] ? MEDALS[i] + " " : "";
    const tr = document.createElement("tr");
    tr.style.animationDelay = (i * 40) + "ms";
    if (i === highlightIdx) tr.classList.add("winner");
    tr.innerHTML =
      '<td class="td-rank' + rankCls + '">' + (i + 1) + '</td>' +
      '<td class="td-name">' + medal + esc(p.name) + '</td>' +
      '<td class="td-pts pts">' + p.points.toLocaleString("it-IT") + '</td>';
    tableBody.appendChild(tr);
  });
}

/* ── Estrazione random ── */
extractBtn.addEventListener("click", () => {
  if (!players.length) return;

  // Animazione "roulette" veloce
  let ticks = 0;
  const maxTicks = 18;
  const interval = setInterval(() => {
    const rnd = Math.floor(Math.random() * players.length);
    renderTable(players, rnd);
    ticks++;
    if (ticks >= maxTicks) {
      clearInterval(interval);
      winnerIdx = Math.floor(Math.random() * players.length);
      renderTable(players, winnerIdx);
      const w = players[winnerIdx];
      wname.textContent = "🏆 " + w.name;
      wpts.textContent  = w.points.toLocaleString("it-IT") + " pt";
      wbanner.style.display = "block";
      wbanner.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }, 80);
});

/* ── CSV ── */
copyBtn.addEventListener("click", () => {
  if (!players.length) return;
  const csv = "Nome,Punti\n" + players.map(p => p.name + "," + p.points).join("\n");
  navigator.clipboard.writeText(csv).then(() => {
    copyBtn.textContent = "✅ Copiato!";
    setTimeout(() => { copyBtn.textContent = "📋 Copia CSV"; }, 2000);
  });
});

/* ── Utils ── */
function setStatus(html, cls) {
  statusDiv.innerHTML = html;
  statusDiv.className = cls;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])
  );
}
</script>
</body>
</html>
