<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Last War - [LegX] - Valhalla Gladiators</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold:   #f5c842;
    --silver: #a8b8d0;
    --bronze: #c97c3a;
    --bg:     #090e1a;
    --panel:  #0d1628;
    --border: #1e3050;
    --accent: #38bdf8;
    --green:  #4ade80;
    --red:    #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: #e2eaf5;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh; padding: 28px 16px 60px;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(56,189,248,0.08) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,48,80,0.3) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,48,80,0.15) 40px);
  }

  header { text-align: center; margin-bottom: 24px; }
  header h1 {
    font-size: 2rem; font-weight: 700; letter-spacing: 4px;
    text-transform: uppercase; color: var(--accent);
    text-shadow: 0 0 24px rgba(56,189,248,0.55);
  }
  header p { color: var(--silver); font-size: .85rem; letter-spacing: 2px; margin-top: 4px; }

  #imageInput { display: none; }
  .drop-zone {
    max-width: 500px; margin: 0 auto 18px;
    border: 2px dashed var(--border); border-radius: 14px;
    background: var(--panel); padding: 26px 20px; text-align: center;
    transition: border-color .2s, background .2s;
  }
  .drop-zone.over { border-color: var(--accent); background: rgba(56,189,248,0.06); }
  .drop-zone .icon { font-size: 2.2rem; display: block; margin-bottom: 8px; }
  .drop-zone p { color: var(--silver); font-size: .95rem; margin-bottom: 12px; }
  .pick-btn {
    display: inline-block; padding: 9px 24px; border-radius: 8px;
    border: 2px solid var(--accent); color: var(--accent); background: transparent;
    font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
    letter-spacing: 1px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: background .2s, color .2s;
  }
  .pick-btn:active { background: var(--accent); color: #0a1628; }

  #file-list {
    display: none; max-width: 500px; margin: 0 auto 14px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .file-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: .9rem;
  }
  .file-item:last-child { border-bottom: none; }
  .fi-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fi-status { font-size: .8rem; letter-spacing: 1px; min-width: 110px; text-align: right; }
  .fi-pending  { color: var(--silver); }
  .fi-scanning { color: var(--accent); }
  .fi-done     { color: var(--green); }
  .fi-error    { color: var(--red); }

  #prog-wrap {
    display: none; max-width: 500px; margin: 0 auto 4px;
    background: #111e35; border-radius: 8px; overflow: hidden; height: 8px;
  }
  #prog-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #38bdf8, #0ea5e9);
    transition: width .2s ease; border-radius: 8px;
  }
  #prog-label {
    max-width: 500px; margin: 0 auto 10px;
    text-align: center; font-size: .78rem; color: var(--silver);
    letter-spacing: 1px; min-height: 18px;
  }

  .btn {
    display: block; margin: 0 auto 16px; padding: 13px 36px;
    border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #0ea5e9);
    color: #0a1628; font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    box-shadow: 0 0 18px rgba(56,189,248,0.3);
    transition: opacity .2s, transform .15s;
  }
  .btn:hover { opacity: .9; transform: translateY(-1px); }
  .btn:active { transform: none; }
  .btn:disabled { background: #1e3050; color: #4a6080; box-shadow: none; cursor: not-allowed; transform: none; }

  #status {
    text-align: center; min-height: 22px; margin-bottom: 14px;
    font-size: .95rem; letter-spacing: 1px; color: var(--silver);
  }
  #status.ok    { color: var(--green); }
  #status.error { color: var(--red); }

  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid rgba(56,189,248,0.3); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tbl-wrap {
    display: none; max-width: 680px; margin: 0 auto;
    border-radius: 14px; overflow: hidden;
    border: 1px solid var(--border); box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #111e35; }
  thead th {
    padding: 11px 14px; font-size: .78rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent);
    border-bottom: 1px solid var(--border);
  }
  thead th:nth-child(1) { text-align: center; width: 36px; }
  thead th:nth-child(2) { text-align: left; }
  thead th:nth-child(3) { text-align: left; color: var(--silver); }
  thead th:nth-child(4) { text-align: right; }

  tbody tr {
    background: var(--panel); border-bottom: 1px solid var(--border);
    transition: background .15s; animation: rowIn .3s ease both;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.winner {
    background: rgba(245,200,66,0.12) !important;
    border: 1px solid rgba(245,200,66,0.4);
    box-shadow: 0 0 18px rgba(245,200,66,0.15) inset;
  }
  tbody tr.winner .name-input { color: var(--gold) !important; }

  @keyframes rowIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:none; } }

  td { padding: 8px 14px; }
  .td-rank { text-align: center; font-family: 'Share Tech Mono', monospace; width: 36px; }
  .td-name { font-weight: 700; font-size: 1rem; }
  .td-src  { font-size: .8rem; color: var(--silver); max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .td-pts  { text-align: right; font-family: 'Share Tech Mono', monospace; color: var(--accent); white-space: nowrap; }
  .rank-1 { color: var(--gold);   font-weight: 700; }
  .rank-2 { color: var(--silver); font-weight: 700; }
  .rank-3 { color: var(--bronze); font-weight: 700; }

  .name-input {
    background: transparent; border: none;
    border-bottom: 1px dashed transparent;
    color: inherit; font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; font-weight: 700; width: 100%;
    outline: none; padding: 2px 4px; border-radius: 4px;
    transition: background .15s, border-color .15s, box-shadow .15s;
    cursor: text;
  }
  .name-input:hover {
    border-bottom-color: rgba(56,189,248,0.5);
    background: rgba(56,189,248,0.05);
  }
  .name-input:focus {
    border-bottom-color: var(--accent);
    background: rgba(56,189,248,0.08);
    box-shadow: 0 2px 0 rgba(56,189,248,0.25);
  }
  tbody tr.winner .name-input:focus {
    border-bottom-color: var(--gold);
    background: rgba(245,200,66,0.08);
    box-shadow: 0 2px 0 rgba(245,200,66,0.25);
  }

  .actions {
    display: none; max-width: 680px; margin: 12px auto 0;
    gap: 10px; justify-content: flex-end; flex-wrap: wrap;
  }
  .btn-sm {
    padding: 8px 18px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--panel); color: var(--silver);
    font-family: 'Rajdhani', sans-serif; font-size: .88rem; font-weight: 600;
    letter-spacing: 1px; cursor: pointer; transition: border-color .2s, color .2s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.highlight { border-color: var(--gold); color: var(--gold); }
  .btn-sm.highlight:hover { background: rgba(245,200,66,0.08); }

  #winner-banner {
    display: none; max-width: 680px; margin: 14px auto 0;
    background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.35);
    border-radius: 12px; padding: 16px 20px; text-align: center;
  }
  .wlabel { font-size: .8rem; letter-spacing: 2px; color: var(--silver); text-transform: uppercase; }
  .wname  { font-size: 1.6rem; font-weight: 700; color: var(--gold); margin: 4px 0; }
  .wpts   { font-family: 'Share Tech Mono', monospace; color: var(--accent); }

  #canvas { display: none; }
</style>
</head>
<body>

<header>
  <h1>⚔ Last War - [LegX] - Valhalla Gladiators</h1>
  <p>OCR Multi-Pass · Multi-File · Estrazione Random</p>
  <p>All rights reserved - rebysa</p>
</header>

<canvas id="canvas"></canvas>
<input type="file" id="imageInput" accept="image/*" multiple/>

<div class="drop-zone" id="dropZone">
  <span class="icon">📷</span>
  <p>Trascina uno o più screenshot qui</p>
  <label for="imageInput" class="pick-btn">Scegli immagini</label>
</div>

<div id="file-list"></div>
<div id="prog-wrap"><div id="prog-bar"></div></div>
<div id="prog-label"></div>
<button class="btn" id="readBtn" disabled>Analizza Screenshot</button>
<div id="status"></div>

<div class="tbl-wrap" id="tableWrap">
  <table>
    <thead><tr><th>#</th><th>Giocatore</th><th>File</th><th>Punti</th></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div id="winner-banner">
  <div class="wlabel">🎰 Vincitore Estratto</div>
  <div class="wname" id="wname"></div>
  <div class="wpts"  id="wpts"></div>
</div>

<div class="actions" id="actions">
  <button class="btn-sm highlight" id="extractBtn">🎲 Estrai Vincitore</button>
  <button class="btn-sm" id="copyBtn">📋 Copia CSV</button>
  <button class="btn-sm" id="resetBtn">🗑 Reset</button>
</div>

<script>
const $ = id => document.getElementById(id);
const imageInput=$("imageInput"), readBtn=$("readBtn"), tableBody=$("tableBody"),
      statusDiv=$("status"), dropZone=$("dropZone"), tableWrap=$("tableWrap"),
      actions=$("actions"), copyBtn=$("copyBtn"), extractBtn=$("extractBtn"),
      resetBtn=$("resetBtn"), progWrap=$("prog-wrap"), progBar=$("prog-bar"),
      progLabel=$("prog-label"), fileListEl=$("file-list"), canvas=$("canvas"),
      wbanner=$("winner-banner"), wname=$("wname"), wpts=$("wpts");
const ctx2d = canvas.getContext("2d");

const MEDALS = ["🥇","🥈","🥉"];
let files=[], players=[], winnerIdx=-1;

/* ── Drag & drop ── */
dropZone.addEventListener("dragover",  e=>{ e.preventDefault(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragleave", ()=>dropZone.classList.remove("over"));
dropZone.addEventListener("drop", e=>{
  e.preventDefault(); dropZone.classList.remove("over");
  addFiles([...e.dataTransfer.files].filter(f=>f.type.startsWith("image/")));
});
imageInput.addEventListener("change",()=>{ addFiles([...imageInput.files]); imageInput.value=""; });

function addFiles(newFiles) {
  newFiles.forEach(f=>{ if (!files.find(x=>x.name===f.name&&x.size===f.size)) files.push(f); });
  renderFileList();
  readBtn.disabled=!files.length;
  players=[]; winnerIdx=-1;
  tableWrap.style.display=actions.style.display="none";
  wbanner.style.display="none";
  setStatus("","");
}

function renderFileList() {
  if (!files.length){ fileListEl.style.display="none"; return; }
  fileListEl.style.display="block";
  fileListEl.innerHTML=files.map((f,i)=>
    `<div class="file-item"><span>📄</span>
     <span class="fi-name">${esc(f.name)}</span>
     <span class="fi-status fi-pending" id="fis-${i}">In attesa</span></div>`
  ).join("");
}
function setFileStatus(i,cls,text){
  const el=$("fis-"+i);
  if(el){ el.className="fi-status "+cls; el.textContent=text; }
}

/* ══════════════════════════════════════════════════════
   PRE-PROCESSING: genera UN blob per ogni filtro
   (3 OCR separati, niente collage → niente duplicati)
   ══════════════════════════════════════════════════════ */

function loadImage(file){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.src=URL.createObjectURL(file);
  });
}

/* Applica una funzione pixel→pixel su un ImageData e restituisce un Blob PNG */
function imageDataToBlob(id){
  canvas.width=id.width; canvas.height=id.height;
  ctx2d.putImageData(id,0,0);
  return new Promise(r=>canvas.toBlob(r,"image/png"));
}

function applyFilter(srcId, fn){
  const dst=new ImageData(new Uint8ClampedArray(srcId.data), srcId.width, srcId.height);
  const d=dst.data;
  for(let i=0;i<d.length;i+=4){
    const [nr,ng,nb]=fn(d[i],d[i+1],d[i+2]);
    d[i]=nr; d[i+1]=ng; d[i+2]=nb;
  }
  return dst;
}

async function getFilteredBlobs(file){
  const img=await loadImage(file);
  const W=img.width*2, H=img.height*2;
  canvas.width=W; canvas.height=H;
  ctx2d.drawImage(img,0,0,W,H);
  const src=ctx2d.getImageData(0,0,W,H);

  /* Filtro 1 – Grayscale + contrasto standard
     Ottimo per: testo nero/scuro su sfondo bianco/grigio chiaro */
  const f1=applyFilter(src,(r,g,b)=>{
    let v=0.299*r+0.587*g+0.114*b;
    v=v>128?Math.min(255,v*1.45):Math.max(0,v*0.55);
    return [v,v,v];
  });

  /* Filtro 2 – Soglia luminanza (threshold fisso a 155)
     Ottimo per: testo scuro su sfondo colorato chiaro (giallo oro, rosa bronzo)
     Sotto 155 → nero (testo), sopra → bianco (sfondo) */
  const f2=applyFilter(src,(r,g,b)=>{
    const v=0.299*r+0.587*g+0.114*b;
    const t=v<155?0:255;
    return [t,t,t];
  });

  /* Filtro 3 – Inversione + threshold
     Ottimo per: testo chiaro su sfondo scuro (blu, grigio scuro) */
  const f3=applyFilter(src,(r,g,b)=>{
    const v=255-(0.299*r+0.587*g+0.114*b);
    const t=v>110?255:0;
    return [t,t,t];
  });

  return [
    await imageDataToBlob(f1),
    await imageDataToBlob(f2),
    await imageDataToBlob(f3),
  ];
}

/* ══════════════════════════════════════════════════════
   OCR: 3 passate per file, risultati fusi con dedup fuzzy
   ══════════════════════════════════════════════════════ */

async function ocrBlob(blob, onProgress){
  const r=await Tesseract.recognize(blob,"eng",{ logger:m=>{
    if(m.status==="recognizing text") onProgress(m.progress);
  }});
  return r.data.text;
}

readBtn.addEventListener("click", async ()=>{
  if(!files.length) return;
  readBtn.disabled=true;
  players=[]; winnerIdx=-1;
  tableWrap.style.display=actions.style.display="none";
  wbanner.style.display="none";
  progWrap.style.display="block";

  const PASS_NAMES=["Filtro standard","Soglia colore","Filtro inverso"];

  for(let i=0;i<files.length;i++){
    const f=files[i];
    setFileStatus(i,"fi-scanning","⏳ Processing…");
    setStatus(`<span class="spinner"></span> File ${i+1}/${files.length}: ${esc(f.name)}`,"");

    try{
      const blobs=await getFilteredBlobs(f);
      const allResults=[];   // raccoglie candidati da tutti e 3 i pass

      for(let p=0;p<blobs.length;p++){
        progBar.style.width="0%";
        progLabel.textContent=`Pass ${p+1}/3 · ${PASS_NAMES[p]}`;
        const text=await ocrBlob(blobs[p], prog=>{
          // progress 0..1 mappato su terzo della barra
          progBar.style.width=((p*33)+(prog*33)).toFixed(0)+"%";
        });
        console.log(`RAW OCR [${f.name}] pass ${p+1}:\n`,text);
        const found=parseLeaderboard(text, f.name);
        allResults.push(...found);
      }

      progBar.style.width="100%";
      progLabel.textContent="";

      // Fondi i 3 pass: per ogni punteggio unico scegli il nome migliore
      const merged=mergeResults(allResults);
      players.push(...merged);
      setFileStatus(i,"fi-done",`✅ ${merged.length} trovati`);

    } catch(err){
      console.error(err);
      progLabel.textContent="";
      setFileStatus(i,"fi-error","❌ Errore");
    }
  }

  progWrap.style.display="none";

  // Deduplica globale cross-file (stesso nome → punteggio più alto)
  const map=new Map();
  players.forEach(p=>{
    const k=normalizeKey(p.name);
    if(!map.has(k)||map.get(k).points<p.points) map.set(k,p);
  });
  players=[...map.values()].sort((a,b)=>b.points-a.points);

  if(!players.length){
    setStatus("❌ Nessun giocatore trovato. Prova screenshot più nitidi.","error");
  } else {
    renderTable(players);
    setStatus(`✅ ${players.length} giocatori da ${files.length} file`,"ok");
    tableWrap.style.display="block";
    actions.style.display="flex";
  }
  readBtn.disabled=false;
});

/* ══════════════════════════════════════════════════════
   MERGE dei 3 pass:
   - Raggruppa per valore dei punti (chiave numerica)
   - Per ogni gruppo scegli il nome con più occorrenze
     o quello più lungo se c'è parità
   ══════════════════════════════════════════════════════ */
function mergeResults(list){
  // Raggruppa per punti
  const byPts=new Map();
  list.forEach(p=>{
    const k=p.points;
    if(!byPts.has(k)) byPts.set(k,[]);
    byPts.get(k).push(p.name);
  });

  const result=[];
  byPts.forEach((names, pts)=>{
    // Conta frequenza di ogni nome normalizzato
    const freq=new Map();
    names.forEach(n=>{
      const k=normalizeKey(n);
      freq.set(k,(freq.get(k)||{count:0,name:n}));
      freq.get(k).count++;
      // tieni il nome più lungo tra le varianti dello stesso gruppo
      if(n.length>freq.get(k).name.length) freq.get(k).name=n;
    });
    // Scegli il gruppo con frequenza più alta (tie-break: nome più lungo)
    let best=null;
    freq.forEach(v=>{ if(!best||v.count>best.count||(v.count===best.count&&v.name.length>best.name.length)) best=v; });
    if(best) result.push({ name:best.name, points:pts, source: list.find(p=>p.points===pts).source });
  });

  return result.sort((a,b)=>b.points-a.points);
}

/* Chiave normalizzata per confronti fuzzy: lowercase, senza spazi e simboli */
function normalizeKey(s){
  return s.toLowerCase().replace(/[^a-z0-9]/g,"");
}

/* ══════════════════════════════════════════════════════
   PARSER
   ══════════════════════════════════════════════════════ */
const SKIP=/gladiators|alliance|legion|valhalla|legx|leaderboard|ranking|score|total|points/i;

function isPointsLine(s){
  const digits=(s.match(/\d/g)||[]).length;
  const seps=(s.match(/[,. ]/g)||[]).length;
  return digits>=5&&(digits+seps)/s.length>0.65;
}
function extractPoints(s){
  const c=s.replace(/[^\d]/g,"");
  return c.length>=5?parseInt(c,10):NaN;
}
function isValidName(s){
  if(!s||s.length<2) return false;
  if(/^\d{1,3}$/.test(s)) return false;
  if(isPointsLine(s)) return false;
  if(SKIP.test(s)) return false;
  return (s.match(/[a-zA-Z]/g)||[]).length>=2;
}
function cleanName(s){
  return s.replace(/[^a-zA-Z0-9 _\-\.]/g,"").replace(/\s+/g," ").trim();
}

function parseLeaderboard(text, sourceName){
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  const results=[], usedPts=new Set(), usedName=new Set();

  for(let i=0;i<lines.length;i++){
    if(!isPointsLine(lines[i])||usedPts.has(i)) continue;
    const pts=extractPoints(lines[i]);
    if(isNaN(pts)||pts<10000) continue;

    const order=[];
    for(let d=-1;d>=-6;d--) order.push(i+d);
    for(let d=1;d<=6;d++)   order.push(i+d);

    let name="";
    for(const j of order){
      if(j<0||j>=lines.length||usedName.has(j)||usedPts.has(j)) continue;
      const c=lines[j];
      if(/[\[\]]/.test(c)||SKIP.test(c)||!isValidName(c)) continue;
      const cleaned=cleanName(c);
      if(cleaned.length<2) continue;
      name=cleaned; usedName.add(j); break;
    }

    if(name){ results.push({name,points:pts,source:sourceName}); usedPts.add(i); }
  }

  results.sort((a,b)=>b.points-a.points);
  const seen=new Set();
  return results.filter(p=>{ const k=normalizeKey(p.name); if(seen.has(k))return false; seen.add(k);return true; });
}

/* ══════════════════════════════════════════════════════
   RENDER tabella con nome editabile
   ══════════════════════════════════════════════════════ */
function renderTable(list, highlightIdx=-1){
  tableBody.innerHTML="";
  list.forEach((p,i)=>{
    const rankCls=i<3?" rank-"+(i+1):"";
    const medal=MEDALS[i]?MEDALS[i]+" ":"";
    const tr=document.createElement("tr");
    tr.style.animationDelay=(i*40)+"ms";
    if(i===highlightIdx) tr.classList.add("winner");

    const rTd=document.createElement("td");
    rTd.className="td-rank"+rankCls; rTd.textContent=i+1;

    const nTd=document.createElement("td"); nTd.className="td-name";
    const inp=document.createElement("input");
    inp.type="text"; inp.className="name-input";
    inp.value=medal+p.name;
    inp.setAttribute("spellcheck","false");
    inp.addEventListener("change",()=>{
      const val=inp.value.replace(/^[🥇🥈🥉]\s*/,"").trim();
      if(val){ players[i].name=val; if(i===winnerIdx) wname.textContent="🏆 "+val; }
    });
    nTd.appendChild(inp);

    const sTd=document.createElement("td"); sTd.className="td-src"; sTd.textContent=p.source;
    const pTd=document.createElement("td"); pTd.className="td-pts";
    pTd.textContent=p.points.toLocaleString("it-IT");

    tr.append(rTd,nTd,sTd,pTd);
    tableBody.appendChild(tr);
  });
}

/* ── Estrazione random ── */
extractBtn.addEventListener("click",()=>{
  if(!players.length) return;
  let ticks=0;
  const iv=setInterval(()=>{
    renderTable(players,Math.floor(Math.random()*players.length));
    if(++ticks>=20){
      clearInterval(iv);
      winnerIdx=Math.floor(Math.random()*players.length);
      renderTable(players,winnerIdx);
      const w=players[winnerIdx];
      wname.textContent="🏆 "+w.name;
      wpts.textContent=w.points.toLocaleString("it-IT")+" pt";
      wbanner.style.display="block";
      wbanner.scrollIntoView({behavior:"smooth",block:"nearest"});
    }
  },80);
});

resetBtn.addEventListener("click",()=>{
  files=[]; players=[]; winnerIdx=-1;
  fileListEl.style.display=tableWrap.style.display=actions.style.display="none";
  wbanner.style.display="none"; readBtn.disabled=true; setStatus("","");
});

copyBtn.addEventListener("click",()=>{
  if(!players.length) return;
  const csv="Nome,Punti,File\n"+players.map(p=>`${p.name},${p.points},${p.source}`).join("\n");
  navigator.clipboard.writeText(csv).then(()=>{
    copyBtn.textContent="✅ Copiato!";
    setTimeout(()=>{ copyBtn.textContent="📋 Copia CSV"; },2000);
  });
});

function setStatus(html,cls){ statusDiv.innerHTML=html; statusDiv.className=cls; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
</script>
</body>
</html>
