<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>Simulatore probabilistico</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  padding: 15px;
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

h2 { margin-bottom: 20px; }

.container {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 12px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

.row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 4px 0;
}

#result {
  font-size: 60px;
  font-weight: bold;
  margin: 20px 0;
  padding: 15px;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  transition: transform 0.2s ease;
}

button {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#history {
  margin-top: 20px;
  font-size: 13px;
  text-align: left;
  opacity: 0.8;
  max-height: 200px;
  overflow-y: auto;
}

/* desktop */
@media(min-width:768px){
  .container { flex-direction: row; justify-content:center; }
  .box { width: 320px; }
}
</style>
</head>

<body>

<h2>🎲 Simulatore probabilistico</h2>

<div class="container">

  <div class="box">
    <h3>🚆 Conducente</h3>
    <div id="conducenteBox"></div>
  </div>

  <div class="box">
    <h3>👑 VIP</h3>
    <div id="vipBox"></div>
  </div>

</div>

<div id="result">-</div>

<button onclick="estrai()">🎰 ESTRAI</button>

<div id="history"></div>

<script>
/* =========================
   CONFIGURAZIONE PESI
========================= */

const conducenteConfig = [
  { range: [1], weight: 30 },
  { range: [2], weight: 20 },
  { range: [3], weight: 10 },
  { range: [4], weight: 7 },
  { range: [5], weight: 2 },
  { range: [6,10], weight: 2 },
  { range: [11,30], weight: 1 }
];

const vipConfig = Array.from({ length: 30 }, (_, i) => {
  const n = i + 1;
  if (n <= 15) return { range: [n], weight: 16 - n };
  return { range: [n], weight: 1 };
});

/* =========================
   UTILS
========================= */

function buildWeights(config) {
  const arr = [];
  config.forEach(c => {
    const [from, to] = c.range.length === 1 ? [c.range[0], c.range[0]] : c.range;
    for (let i = from; i <= to; i++) {
      arr.push(c.weight);
    }
  });
  return arr;
}

function cumulative(p) {
  const c = [];
  let s = 0;
  for (const v of p) {
    s += v;
    c.push(s);
  }
  return c;
}

function draw(cum) {
  const r = Math.random() * cum[cum.length - 1];
  return cum.findIndex(x => r <= x) + 1;
}

/* =========================
   PRECALCOLO
========================= */

const conducenteWeights = buildWeights(conducenteConfig);
const vipWeights = buildWeights(vipConfig);

const conducenteCum = cumulative(conducenteWeights);
const vipCum = cumulative(vipWeights);

/* =========================
   UI INIT
========================= */

function renderConfig(id, config) {
  const el = document.getElementById(id);
  el.innerHTML = config.map(c => {
    return `<div class="row"><b>${c.range.join('-')}</b><span>${c.weight}</span></div>`;
  }).join('');
}

renderConfig("conducenteBox", conducenteConfig);
renderConfig("vipBox", vipConfig);

/* =========================
   STATO
========================= */

const history = [];

/* =========================
   ESTRAZIONE
========================= */

function estrai() {
  const c = draw(conducenteCum);
  const v = draw(vipCum);

  const result = document.getElementById("result");

  // effetto slot
  result.style.transform = "scale(1.15)";
  setTimeout(() => result.style.transform = "scale(1)", 200);

  result.innerHTML = `🚆 ${c} &nbsp;&nbsp; 👑 ${v}`;

  history.push({ c, v });
  renderHistory();
}

/* =========================
   STORICO
========================= */

function renderHistory() {
  const el = document.getElementById("history");
  el.innerHTML =
    "<h4>Storico</h4>" +
    history.slice(-10).map(h =>
      `🚆 ${h.c} - 👑 ${h.v}`
    ).join("<br>");
}
</script>

</body>
</html>
