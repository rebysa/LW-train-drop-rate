<script>
const pesiConducente = [];
for (let i = 1; i <= 30; i++) {
  if (i === 1) pesiConducente.push(30);
  else if (i === 2) pesiConducente.push(20);
  else if (i === 3) pesiConducente.push(10);
  else if (i === 4) pesiConducente.push(7);
  else if (i === 5) pesiConducente.push(2);
  else if (i >= 6 && i <= 10) pesiConducente.push(2);
  else pesiConducente.push(1);
}

const pesiVIP = [];
for (let i = 15; i >= 1; i--) pesiVIP.push(i);
for (let i = 16; i <= 30; i++) pesiVIP.push(1);

function estraiNumero(pesi){
  const totale = pesi.reduce((a,b)=>a+b,0);
  const r = Math.random()*totale;

  let acc = 0;
  for(let i=0;i<pesi.length;i++){
    acc += pesi[i];
    if(r <= acc) return i+1;
  }
}

function estrai(){
  const c = estraiNumero(pesiConducente);
  const v = estraiNumero(pesiVIP);

  const el = document.getElementById("result");

  el.style.transform = "scale(1.2)";
  setTimeout(()=>el.style.transform="scale(1)",200);

  el.innerHTML = `🚆 ${c} &nbsp;&nbsp; 👑 ${v}`;
}

let translations = {};

async function loadLang() {
  const res = await fetch("./locales/it.json");
  translations = await res.json();
  render();
}

function render() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
   el.innerText = translations[key] ?? "";
  });
}

window.onload = loadLang;

<!-- Input per caricare lo screenshot -->
<input type="file" id="screen-shot" accept="image/*">
<button id="btn-read">Leggi Testo</button>

<!-- Contenitore per riportare il testo a video -->
<div id="output-text" style="white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; margin-top: 10px;">
  Il testo letto apparirà qui...
</div>
document.getElementById('btn-read').addEventListener('click', () => {
  const fileInput = document.getElementById('screen-shot');
  const outputDiv = document.getElementById('output-text');
  
  if (fileInput.files.length === 0) {
    alert('Per favore, seleziona prima uno screenshot.');
    return;
  }

  const file = fileInput.files[0];
  outputDiv.innerText = "Analisi dello schermo in corso...";

  // Avvia il riconoscimento testuale (italiano 'ita', o inglese 'eng')
  Tesseract.recognize(
    file,
    'ita', 
    { logger: m => console.log(m) } // Mostra il progresso in console
  ).then(({ data: { text } }) => {
    // Riporta il testo estratto direttamente a video
    outputDiv.innerText = text.trim() || "Nessun testo trovato nello screenshot.";
  }).catch(err => {
    console.error(err);
    outputDiv.innerText = "Errore durante la lettura dello schermo.";
  });
});

</script>
